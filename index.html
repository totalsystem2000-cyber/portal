<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>토탈시스템 업무 포털</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#f0f2f5;color:#1a1a1a;font-size:14px}
.header{background:#1a1a2e;color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.2)}
.header h1{font-size:16px;font-weight:700;letter-spacing:-0.3px}
.worker-btn{background:#e74c3c;border:none;color:#fff;padding:6px 14px;border-radius:20px;font-size:12px;cursor:pointer;font-weight:600}
.tabs{display:flex;background:#fff;border-bottom:2px solid #e5e5e5;position:sticky;top:49px;z-index:99;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.tab{flex:1;padding:11px 4px;font-size:12px;border:none;background:none;color:#999;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;font-family:inherit;font-weight:500}
.tab.on{color:#1a1a2e;border-bottom-color:#1a1a2e;font-weight:700}
.page{display:none;padding:12px}.page.on{display:block}
.card{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.card-title{font-size:13px;font-weight:700;margin-bottom:12px;color:#1a1a2e;display:flex;align-items:center;gap:6px}
.field{margin-bottom:10px}
.field label{display:block;font-size:11px;color:#888;margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:0.3px}
input,select,textarea{width:100%;padding:9px 11px;font-size:13px;border:1.5px solid #e8e8e8;border-radius:8px;background:#fafafa;color:#1a1a1a;font-family:inherit;-webkit-appearance:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:#1a1a2e;background:#fff}
textarea{resize:vertical;min-height:70px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:9px 16px;font-size:13px;border:none;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:600;transition:opacity .15s}
.btn:active{opacity:.8}
.btn-primary{background:#1a1a2e;color:#fff;width:100%;justify-content:center;margin-top:6px}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:6px}
.btn-ok{background:#27ae60;color:#fff}
.btn-warn{background:#e67e22;color:#fff}
.btn-info{background:#2980b9;color:#fff}
.btn-del{background:none;border:none;color:#ccc;cursor:pointer;padding:4px;font-size:16px;line-height:1;flex-shrink:0}
.btn-del:hover{color:#e74c3c}
.btn-gray{background:#f0f0f0;color:#555}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.stat{background:#fff;border-radius:10px;padding:12px;box-shadow:0 1px 4px rgba(0,0,0,0.06);text-align:center}
.stat-n{font-size:22px;font-weight:700;color:#1a1a2e}
.stat-l{font-size:11px;color:#999;margin-top:2px}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.b-ok{background:#d5f5e3;color:#1e8449}
.b-wait{background:#fef9e7;color:#b7950b;border:1px solid #f9e79f}
.b-blue{background:#d6eaf8;color:#1a5276}
.b-red{background:#fadbd8;color:#922b21}
.b-done{background:#f0f0f0;color:#888}
.b-orange{background:#fdebd0;color:#a04000}
.list-item{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid #f0f0f0}
.list-item:last-child{border-bottom:none}
.item-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.item-name{font-size:13px;font-weight:600}
.item-sub{font-size:12px;color:#999;margin-top:1px}
.back-btn{display:flex;align-items:center;gap:4px;font-size:13px;color:#1a1a2e;border:none;background:none;cursor:pointer;margin-bottom:14px;font-family:inherit;font-weight:600;padding:0}
.divider{height:1px;background:#f0f0f0;margin:12px 0}
.empty{text-align:center;padding:24px;color:#bbb;font-size:13px}
.ac-wrap{position:relative}
.ac-list{position:absolute;top:100%;left:0;right:0;background:#fff;border:1.5px solid #1a1a2e;border-radius:8px;z-index:300;max-height:200px;overflow-y:auto;box-shadow:0 4px 16px rgba(0,0,0,0.12);display:none}
.ac-item{padding:10px 12px;font-size:13px;cursor:pointer;border-bottom:1px solid #f5f5f5}
.ac-item:last-child{border-bottom:none}
.ac-item:hover,.ac-item.sel{background:#e8f0fe}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.info-row{display:flex;padding:5px 0;border-bottom:1px solid #f5f5f5;font-size:13px}
.info-row:last-child{border-bottom:none}
.info-key{color:#999;width:75px;flex-shrink:0;font-size:12px;font-weight:600}
.info-val{color:#1a1a1a;flex:1;word-break:break-all}
.loading{text-align:center;padding:20px;color:#bbb;font-size:13px}
.progress-bar{height:5px;background:#eee;border-radius:3px;margin-top:5px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#1a1a2e,#2980b9);border-radius:3px}
.dash-item{display:flex;align-items:flex-start;padding:10px 0;border-bottom:1px solid #f0f0f0;gap:10px}
.dash-item:last-child{border-bottom:none}
/* 결제 프로세스 스텝 */
.pay-steps{display:flex;align-items:center;gap:0;margin:10px 0;overflow-x:auto;padding:4px 0}
.step{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:52px}
.step-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;border:2px solid #e0e0e0;background:#f5f5f5;cursor:pointer;transition:all .2s;flex-shrink:0}
.step-dot.done{background:#27ae60;border-color:#27ae60;color:#fff}
.step-dot.active{background:#1a1a2e;border-color:#1a1a2e;color:#fff;box-shadow:0 0 0 3px rgba(26,26,46,0.15)}
.step-dot.pending{background:#f5f5f5;border-color:#ddd;color:#bbb}
.step-label{font-size:10px;color:#999;text-align:center;line-height:1.2;white-space:nowrap}
.step-label.done{color:#27ae60;font-weight:600}
.step-label.active{color:#1a1a2e;font-weight:700}
.step-line{flex:1;height:2px;background:#e0e0e0;min-width:12px;margin-bottom:14px}
.step-line.done{background:#27ae60}
.pay-card{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,0.06);border-left:4px solid #e0e0e0}
.pay-card.urgent{border-left-color:#e74c3c}
.pay-card.normal{border-left-color:#2980b9}
.pay-card.done-card{border-left-color:#27ae60;opacity:.75}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:999;overflow-y:auto}
.modal-box{background:#fff;margin:16px 12px;border-radius:16px;padding:20px}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.modal-close{background:none;border:none;font-size:24px;cursor:pointer;color:#999;line-height:1}
.section-label{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}
.pay-type-grid{display:grid;grid-template-columns:1fr;gap:6px;margin-bottom:10px}
.pay-type-btn{padding:10px 14px;border:1.5px solid #e0e0e0;border-radius:8px;background:#fafafa;text-align:left;cursor:pointer;font-family:inherit;font-size:12px;color:#555;line-height:1.5;transition:all .15s}
.pay-type-btn:hover,.pay-type-btn.sel{border-color:#1a1a2e;background:#e8f0fe;color:#1a1a2e;font-weight:600}
.pay-type-btn .pt-title{font-size:13px;font-weight:700;display:block;margin-bottom:2px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:9999;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap}
.toast.show{opacity:1}
.file-upload-area{border:2px dashed #ddd;border-radius:8px;padding:16px;text-align:center;cursor:pointer;color:#bbb;font-size:13px;margin-bottom:8px}
.file-upload-area:hover{border-color:#1a1a2e;color:#1a1a2e}
.chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;background:#f0f0f0;color:#555;margin:2px}
</style>
</head>
<body>

<div id="toast" class="toast"></div>

<div class="header">
  <h1>🏗️ 토탈시스템</h1>
  <button class="worker-btn" onclick="openModal('worker-modal')">📋 일지 입력</button>
</div>

<div class="tabs">
  <button class="tab on" onclick="showTab('dash',this)">대시보드</button>
  <button class="tab" onclick="showTab('clients',this)">거래처</button>
  <button class="tab" onclick="showTab('sites',this)">현장</button>
  <button class="tab" onclick="showTab('pay',this)">결제</button>
</div>

<!-- 대시보드 -->
<div id="dash" class="page on">
  <div class="stat-grid" id="dash-stats"></div>
  <div class="card"><div class="card-title">📊 현장별 지출</div><div id="dash-sites"><div class="loading">로딩 중...</div></div></div>
  <div class="card"><div class="card-title">🔴 결제 대기</div><div id="dash-pay"><div class="loading">로딩 중...</div></div></div>
</div>

<!-- 거래처 -->
<div id="clients" class="page">
  <div id="client-list-view">
    <div class="card">
      <div class="card-title">🏢 거래처 등록</div>
      <div class="field"><label>상호명 *</label><input type="text" id="c-name" placeholder="예) 서울남부보호관찰소"></div>
      <div class="row2">
        <div class="field"><label>대표자명</label><input type="text" id="c-ceo" placeholder="홍길동"></div>
        <div class="field"><label>사업자번호</label><input type="text" id="c-biz" placeholder="000-00-00000"></div>
      </div>
      <div class="field"><label>주소</label><input type="text" id="c-addr" placeholder="주소"></div>
      <div class="row2">
        <div class="field"><label>전화번호</label><input type="text" id="c-tel" placeholder="02-0000-0000"></div>
        <div class="field"><label>이메일</label><input type="text" id="c-email" placeholder="example@email.com"></div>
      </div>
      <div class="divider"></div>
      <div class="section-label">이체 정보</div>
      <div class="row2">
        <div class="field"><label>은행명</label><input type="text" id="c-bank" placeholder="예) 국민은행"></div>
        <div class="field"><label>예금주</label><input type="text" id="c-holder" placeholder="예금주명"></div>
      </div>
      <div class="field"><label>계좌번호</label><input type="text" id="c-account" placeholder="000-000-000000"></div>
      <div class="field"><label>메모</label><input type="text" id="c-memo" placeholder="메모"></div>
      <button class="btn btn-primary" onclick="addClient()">➕ 거래처 등록</button>
    </div>
    <div class="card">
      <div class="card-title">📋 거래처 목록
        <button class="btn btn-sm btn-gray" onclick="openModal('excel-modal')" style="margin-left:auto;font-size:11px">📥 엑셀 일괄 등록</button>
      </div>
      <div class="field"><input type="text" id="c-search" placeholder="🔍 거래처 검색..." oninput="renderClients()" style="margin-bottom:0"></div>
      <div id="client-list" style="margin-top:10px"><div class="loading">로딩 중...</div></div>
    </div>
  </div>
  <div id="client-detail-view" style="display:none">
    <button class="back-btn" onclick="showView('client-list-view','client-detail-view')">← 거래처 목록</button>
    <div class="card" id="client-detail-card"></div>
  </div>
</div>

<!-- 현장 -->
<div id="sites" class="page">
  <div id="site-list-view">
    <div class="stat-grid" id="site-stats"></div>
    <div class="card">
      <div class="card-title">🏗️ 현장 등록</div>
      <div class="field"><label>발주처 *</label>
        <div class="ac-wrap"><input type="text" id="s-client" placeholder="거래처 자동완성" oninput="acSearch(this.value,'s-client-ac','s-client','client')" autocomplete="off"><div class="ac-list" id="s-client-ac"></div></div>
      </div>
      <div class="field"><label>건명 *</label><input type="text" id="s-contract" placeholder="예) 냉난방기 전열공사 및 롤스크린 설치"></div>
      <div class="row2">
        <div class="field"><label>착공일</label><input type="date" id="s-start"></div>
        <div class="field"><label>준공예정일</label><input type="date" id="s-end"></div>
      </div>
      <div class="row2">
        <div class="field"><label>계약금액 (원)</label><input type="number" id="s-price" placeholder="0"></div>
        <div class="field"><label>상태</label><select id="s-status"><option value="진행중">진행중</option><option value="완료">완료</option><option value="대기">대기</option></select></div>
      </div>
      <button class="btn btn-primary" onclick="addSite()">➕ 현장 등록</button>
    </div>
    <div class="card">
      <div class="card-title">📋 현장 목록</div>
      <div class="field"><input type="text" id="s-search" placeholder="🔍 현장 검색..." oninput="renderSites()" style="margin-bottom:0"></div>
      <div id="site-list" style="margin-top:10px"><div class="loading">로딩 중...</div></div>
    </div>
  </div>
  <div id="site-detail-view" style="display:none">
    <button class="back-btn" onclick="showView('site-list-view','site-detail-view');renderSites()">← 현장 목록</button>
    <div class="card" id="site-detail-card"></div>
  </div>
</div>

<!-- 결제 -->
<div id="pay" class="page">
  <div class="stat-grid" id="pay-stats"></div>
  <div style="display:flex;gap:8px;margin-bottom:10px">
    <button class="btn btn-primary" style="margin-top:0;flex:1" onclick="openModal('pay-modal')">➕ 결제 등록</button>
    <select id="pay-filter" onchange="renderPays()" style="width:auto;flex:1;font-size:12px">
      <option value="all">전체</option>
      <option value="진행">진행중</option>
      <option value="완료">완료</option>
    </select>
  </div>
  <div id="pay-list"><div class="loading">로딩 중...</div></div>
</div>

<!-- 직원 일지 모달 -->
<div id="worker-modal" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-title">📋 현장 일지 등록<button class="modal-close" onclick="closeModal('worker-modal')">×</button></div>
    <div class="field"><label>날짜 *</label><input type="date" id="w-date"></div>
    <div class="field"><label>현장/건명 *</label>
      <div class="ac-wrap"><input type="text" id="w-site" placeholder="현장명 입력" oninput="acSearch(this.value,'w-site-ac','w-site','site')" autocomplete="off"><div class="ac-list" id="w-site-ac"></div></div>
    </div>
    <div class="field"><label>작업자 *</label><input type="text" id="w-workers" placeholder="예) 홍길동, 김철수"></div>
    <div class="row2">
      <div class="field"><label>시작시간</label><input type="time" id="w-start" value="08:00"></div>
      <div class="field"><label>종료시간</label><input type="time" id="w-end" value="17:00"></div>
    </div>
    <div class="field"><label>작업내용 *</label><textarea id="w-work" placeholder="오늘 작업 내용을 입력하세요"></textarea></div>
    <div class="field"><label>특이사항</label><input type="text" id="w-note" placeholder="없으면 비워두세요"></div>
    <button class="btn btn-primary" style="background:#27ae60" onclick="submitLog()">✅ 일지 제출</button>
  </div>
</div>

<!-- 결제 등록 모달 -->
<div id="pay-modal" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-title">💰 결제 등록<button class="modal-close" onclick="closeModal('pay-modal')">×</button></div>
    <div class="field"><label>거래처 *</label>
      <div class="ac-wrap"><input type="text" id="p-vendor" placeholder="거래처 자동완성" oninput="acSearch(this.value,'p-vendor-ac','p-vendor','client')" autocomplete="off"><div class="ac-list" id="p-vendor-ac"></div></div>
    </div>
    <div class="field"><label>현장/건명</label>
      <div class="ac-wrap"><input type="text" id="p-site" placeholder="현장 자동완성" oninput="acSearch(this.value,'p-site-ac','p-site','site')" autocomplete="off"><div class="ac-list" id="p-site-ac"></div></div>
    </div>
    <div class="row2">
      <div class="field"><label>금액 (원) *</label><input type="number" id="p-amount" placeholder="0"></div>
      <div class="field"><label>비용항목</label><select id="p-cat"><option value="자재비">자재비</option><option value="인건비">인건비</option><option value="장비비">장비비</option><option value="용역비">용역비</option><option value="임차비">임차비</option><option value="기타">기타</option></select></div>
    </div>
    <div class="field"><label>결제 유형 *</label>
      <div class="pay-type-grid">
        <button class="pay-type-btn" onclick="selPayType(1,this)"><span class="pt-title">유형 1 — 일반 (거래명세서 → 세금계산서 → 확인 → 송금)</span>자재 구매 등 일반적인 경우</button>
        <button class="pay-type-btn" onclick="selPayType(2,this)"><span class="pt-title">유형 2 — 역순 (세금계산서 → 거래명세서 → 확인 → 송금)</span>세금계산서가 먼저 온 경우</button>
        <button class="pay-type-btn" onclick="selPayType(3,this)"><span class="pt-title">유형 3 — 선확인 (확인 → 송금 → 세금계산서 → 거래명세서)</span>급히 송금 먼저 한 경우</button>
        <button class="pay-type-btn" onclick="selPayType(4,this)"><span class="pt-title">유형 4 — 선송금 (거래명세서 → 확인 → 송금)</span>거래명세서만 받고 선송금</button>
        <button class="pay-type-btn" onclick="selPayType(5,this)"><span class="pt-title">유형 5 — 용역/임차 (세금계산서 → 확인 → 송금)</span>용역·임차 등 거래명세서 없음</button>
      </div>
    </div>
    <div class="field"><label>메모</label><input type="text" id="p-memo" placeholder="메모"></div>
    <button class="btn btn-primary" onclick="addPay()">📨 등록</button>
  </div>
</div>

<!-- 엑셀 일괄 등록 모달 -->
<div id="excel-modal" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-title">📥 엑셀 일괄 등록<button class="modal-close" onclick="closeModal('excel-modal')">×</button></div>
    <p style="font-size:13px;color:#555;margin-bottom:12px;line-height:1.6">엑셀의 거래처 데이터를 아래에 붙여넣으세요.<br>형식: <b>거래처코드 탭 거래처명 탭 대표자명 탭 전화 탭 모바일 탭 이메일</b></p>
    <div class="field"><label>데이터 붙여넣기</label><textarea id="excel-paste" placeholder="엑셀에서 복사한 데이터를 여기에 붙여넣으세요..." style="min-height:150px;font-size:12px;font-family:monospace"></textarea></div>
    <button class="btn btn-primary" onclick="importExcel()">📥 일괄 등록</button>
  </div>
</div>

<!-- 결제 단계 처리 모달 -->
<div id="step-modal" class="modal-overlay">
  <div class="modal-box" id="step-modal-content"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCIVU7AGBy_3-iVL0QEbbB7Y3YTNidWUIo",
  authDomain: "totalsystem-3aeb9.firebaseapp.com",
  projectId: "totalsystem-3aeb9",
  storageBucket: "totalsystem-3aeb9.firebasestorage.app",
  messagingSenderId: "1008684553488",
  appId: "1:1008684553488:web:d04275a98881ebcf0f4195"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let clients=[], sites=[], logs=[], pays=[];
let curSiteId=null, selPayTypeNum=0;

// 결제 유형 정의
const PAY_TYPES = {
  1:{name:'유형1 일반',steps:['거래명세서','세금계산서','확인','송금완료']},
  2:{name:'유형2 역순',steps:['세금계산서','거래명세서','확인','송금완료']},
  3:{name:'유형3 선확인',steps:['확인','송금완료','세금계산서','거래명세서']},
  4:{name:'유형4 선송금',steps:['거래명세서','확인','송금완료']},
  5:{name:'유형5 용역/임차',steps:['세금계산서','확인','송금완료']}
};

const STEP_ICONS = {'거래명세서':'📄','세금계산서':'🧾','확인':'✅','송금완료':'💸'};

// 실시간 구독
onSnapshot(collection(db,'clients'),snap=>{clients=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.name||'').localeCompare(b.name||''));renderClients();renderDash();});
onSnapshot(collection(db,'sites'),snap=>{sites=snap.docs.map(d=>({id:d.id,...d.data()}));renderSites();renderDash();});
onSnapshot(collection(db,'logs'),snap=>{logs=snap.docs.map(d=>({id:d.id,...d.data()}));if(curSiteId)renderLogList();renderDash();});
onSnapshot(collection(db,'pays'),snap=>{pays=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));renderPays();renderDash();});

// 유틸
window.showToast=function(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
window.openModal=function(id){document.getElementById(id).style.display='block';document.body.style.overflow='hidden';}
window.closeModal=function(id){document.getElementById(id).style.display='none';document.body.style.overflow='';}
window.showTab=function(id,el){document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));document.getElementById(id).classList.add('on');el.classList.add('on');if(id==='dash')renderDash();}
window.showView=function(showId,hideId){document.getElementById(showId).style.display='';document.getElementById(hideId).style.display='none';}

// 자동완성
window.acSearch=function(val,acId,inputId,type){
  const ac=document.getElementById(acId);
  if(!val||val.length<1){ac.style.display='none';return;}
  let items=[];
  if(type==='client')items=clients.filter(c=>c.name&&c.name.includes(val)).slice(0,8);
  if(type==='site')items=sites.filter(s=>((s.client||'')+(s.contract||'')).includes(val)).slice(0,8);
  if(!items.length){ac.style.display='none';return;}
  ac.innerHTML=items.map(i=>{
    const label=type==='client'?i.name:`${i.client} - ${i.contract}`;
    return`<div class="ac-item" onclick="selAc('${label.replace(/'/g,"\\'")}','${acId}','${inputId}')">${label}</div>`;
  }).join('');
  ac.style.display='block';
}
window.selAc=function(val,acId,inputId){document.getElementById(inputId).value=val;document.getElementById(acId).style.display='none';}
document.addEventListener('click',e=>{if(!e.target.closest('.ac-wrap'))document.querySelectorAll('.ac-list').forEach(a=>a.style.display='none');});

// 결제 유형 선택
window.selPayType=function(num,el){
  selPayTypeNum=num;
  document.querySelectorAll('.pay-type-btn').forEach(b=>b.classList.remove('sel'));
  el.classList.add('sel');
}

// 거래처
window.addClient=async function(){
  const name=document.getElementById('c-name').value.trim();
  if(!name)return showToast('⚠️ 상호명을 입력하세요');
  await addDoc(collection(db,'clients'),{name,ceo:document.getElementById('c-ceo').value.trim(),biz:document.getElementById('c-biz').value.trim(),addr:document.getElementById('c-addr').value.trim(),tel:document.getElementById('c-tel').value.trim(),email:document.getElementById('c-email').value.trim(),bank:document.getElementById('c-bank').value.trim(),holder:document.getElementById('c-holder').value.trim(),account:document.getElementById('c-account').value.trim(),memo:document.getElementById('c-memo').value.trim(),createdAt:Date.now()});
  ['c-name','c-ceo','c-biz','c-addr','c-tel','c-email','c-bank','c-holder','c-account','c-memo'].forEach(id=>document.getElementById(id).value='');
  showToast('✅ 거래처 등록 완료');
}

window.importExcel=async function(){
  const text=document.getElementById('excel-paste').value.trim();
  if(!text)return showToast('⚠️ 데이터를 붙여넣으세요');
  const lines=text.split('\n').filter(l=>l.trim());
  let count=0;
  for(const line of lines){
    const cols=line.split('\t');
    if(cols.length<2)continue;
    const name=(cols[1]||'').trim();
    if(!name||name==='거래처명')continue;
    if(clients.find(c=>c.name===name))continue;
    await addDoc(collection(db,'clients'),{name,biz:(cols[0]||'').trim(),ceo:(cols[2]||'').trim(),tel:(cols[3]||'').trim(),mobile:(cols[4]||'').trim(),email:(cols[5]||'').trim(),bank:'',holder:'',account:'',memo:'',createdAt:Date.now()});
    count++;
  }
  document.getElementById('excel-paste').value='';
  closeModal('excel-modal');
  showToast(`✅ ${count}개 거래처 등록 완료`);
}

window.deleteClient=async function(id){
  if(!confirm('이 거래처를 삭제할까요?'))return;
  await deleteDoc(doc(db,'clients',id));
  showToast('🗑️ 삭제 완료');
}

window.openClient=function(id){
  const c=clients.find(c=>c.id===id);if(!c)return;
  const related=sites.filter(s=>s.client===c.name);
  const cp=pays.filter(p=>p.vendor===c.name);
  const totalPay=cp.reduce((s,p)=>s+(p.amount||0),0);
  document.getElementById('client-detail-card').innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
      <div><div style="font-size:16px;font-weight:700">${c.name}</div><div style="font-size:12px;color:#999;margin-top:2px">${c.memo||''}</div></div>
      <div style="display:flex;gap:6px"><button class="btn btn-sm btn-gray" onclick="editClient('${id}')">✏️ 수정</button><button class="btn btn-sm" style="background:#fde8e8;color:#c0392b" onclick="deleteClient('${id}');showView('client-list-view','client-detail-view')">🗑️</button></div>
    </div>
    <div class="divider" style="margin:8px 0"></div>
    ${[['대표자',c.ceo],['사업자번호',c.biz],['주소',c.addr],['전화',c.tel],['이메일',c.email]].filter(r=>r[1]).map(r=>`<div class="info-row"><div class="info-key">${r[0]}</div><div class="info-val">${r[1]}</div></div>`).join('')}
    ${(c.bank||c.account)?`<div class="divider" style="margin:8px 0"></div>
    <div class="section-label">이체 정보</div>
    ${[['은행',c.bank],['예금주',c.holder],['계좌번호',c.account]].filter(r=>r[1]).map(r=>`<div class="info-row"><div class="info-key">${r[0]}</div><div class="info-val" style="font-weight:${r[0]==='계좌번호'?'700':'400'};color:${r[0]==='계좌번호'?'#1a1a2e':'inherit'}">${r[1]}</div></div>`).join('')}`:''}
    <div class="divider"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
      <div class="stat" style="padding:10px"><div class="stat-n" style="font-size:15px">${related.length}</div><div class="stat-l">관련 현장</div></div>
      <div class="stat" style="padding:10px"><div class="stat-n" style="font-size:15px">${Math.round(totalPay/10000)}만</div><div class="stat-l">총 거래액</div></div>
    </div>
    <div class="section-label">관련 현장 ${related.length}건</div>
    ${related.length?related.map(s=>`<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #f5f5f5;font-size:13px">
      <div style="flex:1"><div style="font-weight:600">${s.contract}</div><div style="font-size:12px;color:#999">${s.start||''}${s.end?' ~ '+s.end:''}</div></div>
      <span class="badge ${s.status==='진행중'?'b-ok':s.status==='완료'?'b-done':'b-wait'}">${s.status}</span>
    </div>`).join(''):'<div class="empty">관련 현장 없음</div>'}`;
  showView('client-detail-view','client-list-view');
}

window.editClient=function(id){
  const c=clients.find(c=>c.id===id);if(!c)return;
  document.getElementById('client-detail-card').innerHTML=`
    <div style="font-size:14px;font-weight:700;margin-bottom:14px">거래처 수정</div>
    ${[['상호명','name'],['대표자','ceo'],['사업자번호','biz'],['주소','addr'],['전화','tel'],['이메일','email'],['은행','bank'],['예금주','holder'],['계좌번호','account'],['메모','memo']].map(([l,k])=>`<div class="field"><label>${l}</label><input type="text" id="edit-${k}" value="${(c[k]||'').replace(/"/g,'&quot;')}"></div>`).join('')}
    <div style="display:flex;gap:8px"><button class="btn btn-primary" style="flex:1" onclick="saveEdit('${id}')">💾 저장</button><button class="btn btn-gray" style="flex:1" onclick="openClient('${id}')">취소</button></div>`;
}

window.saveEdit=async function(id){
  const data={};
  ['name','ceo','biz','addr','tel','email','bank','holder','account','memo'].forEach(k=>{const el=document.getElementById('edit-'+k);if(el)data[k]=el.value.trim();});
  await updateDoc(doc(db,'clients',id),data);
  showToast('✅ 저장 완료');
  openClient(id);
}

function renderClients(){
  const q=(document.getElementById('c-search')||{}).value||'';
  const filtered=q?clients.filter(c=>c.name&&c.name.includes(q)):clients;
  const el=document.getElementById('client-list');
  if(!el)return;
  if(!filtered.length){el.innerHTML='<div class="empty">거래처가 없습니다</div>';return;}
  el.innerHTML=filtered.map(c=>`<div class="list-item">
    <div class="item-icon" style="background:#e8f0fe;cursor:pointer" onclick="openClient('${c.id}')">🏢</div>
    <div style="flex:1;min-width:0;cursor:pointer" onclick="openClient('${c.id}')">
      <div class="item-name">${c.name}</div>
      <div class="item-sub">${c.ceo?'대표 '+c.ceo:''} ${c.biz?'· '+c.biz:''}</div>
    </div>
    <button class="btn-del" onclick="deleteClient('${c.id}')">🗑</button>
  </div>`).join('');
}

// 현장
window.addSite=async function(){
  const client=document.getElementById('s-client').value.trim();
  const contract=document.getElementById('s-contract').value.trim();
  if(!client||!contract)return showToast('⚠️ 발주처와 건명을 입력하세요');
  await addDoc(collection(db,'sites'),{client,contract,start:document.getElementById('s-start').value,end:document.getElementById('s-end').value,price:parseInt(document.getElementById('s-price').value)||0,status:document.getElementById('s-status').value,createdAt:Date.now()});
  ['s-client','s-contract','s-start','s-end','s-price'].forEach(id=>document.getElementById(id).value='');
  showToast('✅ 현장 등록 완료');
}

window.deleteSite=async function(id){
  if(!confirm('이 현장을 삭제할까요?\n관련 일지도 함께 삭제됩니다.'))return;
  await deleteDoc(doc(db,'sites',id));
  const siteLogs=logs.filter(l=>l.siteId===id);
  for(const l of siteLogs)await deleteDoc(doc(db,'logs',l.id));
  showToast('🗑️ 삭제 완료');
}

window.openSite=function(id){
  curSiteId=id;
  const s=sites.find(s=>s.id===id);if(!s)return;
  const sp=pays.filter(p=>p.siteKey&&p.siteKey.includes(s.contract));
  const total=sp.reduce((sum,p)=>sum+(p.amount||0),0);
  const labor=sp.filter(p=>p.cat==='인건비').reduce((sum,p)=>sum+(p.amount||0),0);
  const mat=sp.filter(p=>p.cat==='자재비').reduce((sum,p)=>sum+(p.amount||0),0);
  document.getElementById('site-detail-card').innerHTML=`
    <div style="display:flex;justify-content:space-between;margin-bottom:10px">
      <div><div style="font-size:15px;font-weight:700">${s.contract}</div><div style="font-size:12px;color:#999;margin-top:3px">${s.client}</div>
      <div style="margin-top:6px;display:flex;gap:6px"><span class="badge ${s.status==='진행중'?'b-ok':s.status==='완료'?'b-done':'b-wait'}">${s.status}</span><span style="font-size:12px;color:#999">${s.start||''}${s.end?' ~ '+s.end:''}</span></div></div>
      <button class="btn-del" onclick="deleteSite('${id}');showView('site-list-view','site-detail-view')">🗑️</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:14px">
      <div class="stat" style="padding:8px"><div class="stat-n" style="font-size:14px">${Math.round(total/10000)}만</div><div class="stat-l">총지출</div></div>
      <div class="stat" style="padding:8px"><div class="stat-n" style="font-size:14px">${Math.round(labor/10000)}만</div><div class="stat-l">인건비</div></div>
      <div class="stat" style="padding:8px"><div class="stat-n" style="font-size:14px">${Math.round(mat/10000)}만</div><div class="stat-l">자재비</div></div>
    </div>
    <div class="divider"></div>
    <div class="section-label" style="margin-bottom:10px">일지 등록</div>
    <div class="field"><label>날짜</label><input type="date" id="l-date" value="${new Date().toISOString().slice(0,10)}"></div>
    <div class="field"><label>작업자 *</label><input type="text" id="l-workers" placeholder="홍길동, 김철수"></div>
    <div class="row2"><div class="field"><label>시작</label><input type="time" id="l-start" value="08:00"></div><div class="field"><label>종료</label><input type="time" id="l-end" value="17:00"></div></div>
    <div class="field"><label>작업내용 *</label><textarea id="l-work" placeholder="오늘 작업 내용"></textarea></div>
    <div class="field"><label>특이사항</label><input type="text" id="l-note" placeholder="없으면 비워두세요"></div>
    <button class="btn btn-primary" onclick="addLog()">➕ 일지 등록</button>
    <div class="divider"></div>
    <div id="log-list-area"></div>`;
  renderLogList();
  showView('site-detail-view','site-list-view');
}

function renderLogList(){
  const area=document.getElementById('log-list-area');if(!area)return;
  const sl=logs.filter(l=>l.siteId===curSiteId).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  area.innerHTML=`<div class="section-label">일지 ${sl.length}건</div>`+(sl.length?sl.map(l=>`<div style="padding:10px 0;border-bottom:1px solid #f0f0f0">
    <div style="display:flex;justify-content:space-between"><span style="font-size:12px;color:#999">${l.date||''} ${l.startTime?l.startTime+'~'+l.endTime:''}</span><button class="btn-del" onclick="deleteLog('${l.id}')">🗑</button></div>
    <div style="font-size:13px;font-weight:600;margin-top:2px">👷 ${l.workers||''}</div>
    <div style="font-size:13px;color:#444;margin-top:2px">${l.work||''}</div>
    ${l.note?`<div style="font-size:12px;color:#e67e22;margin-top:2px">⚠️ ${l.note}</div>`:''}
  </div>`).join(''):'<div class="empty">일지 없음</div>');
}

window.addLog=async function(){
  const workers=document.getElementById('l-workers').value.trim();
  const work=document.getElementById('l-work').value.trim();
  if(!workers||!work)return showToast('⚠️ 작업자와 작업내용을 입력하세요');
  await addDoc(collection(db,'logs'),{siteId:curSiteId,date:document.getElementById('l-date').value,workers,startTime:document.getElementById('l-start').value,endTime:document.getElementById('l-end').value,work,note:document.getElementById('l-note').value.trim(),createdAt:Date.now()});
  document.getElementById('l-workers').value='';document.getElementById('l-work').value='';document.getElementById('l-note').value='';
  showToast('✅ 일지 등록 완료');
}

window.deleteLog=async function(id){
  await deleteDoc(doc(db,'logs',id));showToast('🗑️ 삭제 완료');
}

window.submitLog=async function(){
  const site=document.getElementById('w-site').value.trim();
  const workers=document.getElementById('w-workers').value.trim();
  const work=document.getElementById('w-work').value.trim();
  if(!site||!workers||!work)return showToast('⚠️ 현장, 작업자, 작업내용은 필수입니다');
  const matched=sites.find(s=>(s.client+' - '+s.contract)===site||s.contract===site);
  await addDoc(collection(db,'logs'),{siteId:matched?matched.id:'',siteName:site,date:document.getElementById('w-date').value,workers,startTime:document.getElementById('w-start').value,endTime:document.getElementById('w-end').value,work,note:document.getElementById('w-note').value.trim(),createdAt:Date.now()});
  showToast('✅ 일지 제출 완료! 수고하셨습니다 👍');
  closeModal('worker-modal');
}

function renderSites(){
  const q=(document.getElementById('s-search')||{}).value||'';
  const filtered=q?sites.filter(s=>((s.client||'')+(s.contract||'')).includes(q)):sites;
  const active=sites.filter(s=>s.status==='진행중').length;
  const sEl=document.getElementById('site-stats');
  if(sEl)sEl.innerHTML=`<div class="stat"><div class="stat-n">${sites.length}</div><div class="stat-l">전체 현장</div></div><div class="stat"><div class="stat-n">${active}</div><div class="stat-l">진행중</div></div>`;
  const el=document.getElementById('site-list');if(!el)return;
  if(!filtered.length){el.innerHTML='<div class="empty">현장이 없습니다</div>';return;}
  el.innerHTML=filtered.map(s=>`<div class="list-item">
    <div class="item-icon" style="background:#e8f5e9;cursor:pointer" onclick="openSite('${s.id}')">🏗️</div>
    <div style="flex:1;min-width:0;cursor:pointer" onclick="openSite('${s.id}')">
      <div class="item-name" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.contract}</div>
      <div class="item-sub">${s.client}</div>
    </div>
    <span class="badge ${s.status==='진행중'?'b-ok':s.status==='완료'?'b-done':'b-wait'}" style="margin-right:4px">${s.status}</span>
    <button class="btn-del" onclick="deleteSite('${s.id}')">🗑</button>
  </div>`).join('');
}

// 결제
window.addPay=async function(){
  const vendor=document.getElementById('p-vendor').value.trim();
  const amount=parseInt(document.getElementById('p-amount').value)||0;
  if(!vendor||!amount)return showToast('⚠️ 거래처와 금액을 입력하세요');
  if(!selPayTypeNum)return showToast('⚠️ 결제 유형을 선택하세요');
  const pt=PAY_TYPES[selPayTypeNum];
  await addDoc(collection(db,'pays'),{vendor,amount,siteKey:document.getElementById('p-site').value.trim(),cat:document.getElementById('p-cat').value,memo:document.getElementById('p-memo').value.trim(),typeNum:selPayTypeNum,typeName:pt.name,steps:pt.steps,curStep:0,stepDates:{},createdAt:Date.now(),date:new Date().toLocaleDateString('ko-KR')});
  ['p-vendor','p-amount','p-site','p-memo'].forEach(id=>document.getElementById(id).value='');
  selPayTypeNum=0;document.querySelectorAll('.pay-type-btn').forEach(b=>b.classList.remove('sel'));
  closeModal('pay-modal');showToast('✅ 결제 등록 완료');
}

window.openStepModal=function(id){
  const p=pays.find(p=>p.id===id);if(!p)return;
  const steps=p.steps||[];
  const cur=p.curStep||0;
  const isDone=cur>=steps.length;
  const c=clients.find(c=>c.name===p.vendor);
  const accountInfo=c&&c.account?`<div style="background:#e8f5e9;border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:13px"><div style="font-weight:700;color:#1e8449;margin-bottom:4px">💳 이체 정보</div><div>${c.bank||''} ${c.account||''} (${c.holder||''})</div></div>`:'';
  let stepsHtml='<div class="pay-steps">';
  steps.forEach((s,i)=>{
    const state=i<cur?'done':i===cur?'active':'pending';
    stepsHtml+=`<div class="step"><div class="step-dot ${state}" onclick="${!isDone&&i===cur?`nextStep('${id}',${i})`:''}">`;
    stepsHtml+=state==='done'?'✓':STEP_ICONS[s]||'○';
    stepsHtml+=`</div><div class="step-label ${state}">${s}</div></div>`;
    if(i<steps.length-1)stepsHtml+=`<div class="step-line ${i<cur?'done':''}"></div>`;
  });
  stepsHtml+='</div>';
  const nextStep=!isDone?steps[cur]:'';
  document.getElementById('step-modal-content').innerHTML=`
    <div class="modal-title">${p.typeName||''}<button class="modal-close" onclick="closeModal('step-modal')">×</button></div>
    <div style="font-size:15px;font-weight:700;margin-bottom:4px">${p.vendor}</div>
    <div style="font-size:13px;color:#666;margin-bottom:8px">${p.siteKey||'-'} · <b>${(p.amount||0).toLocaleString()}원</b> · ${p.cat||''}</div>
    ${accountInfo}
    ${stepsHtml}
    ${!isDone?`<div style="background:#f8f9fa;border-radius:8px;padding:12px;margin-top:8px;margin-bottom:12px;text-align:center">
      <div style="font-size:12px;color:#888;margin-bottom:4px">다음 처리 단계</div>
      <div style="font-size:16px;font-weight:700;color:#1a1a2e">${STEP_ICONS[nextStep]||''} ${nextStep}</div>
    </div>
    <button class="btn btn-primary" style="background:#27ae60" onclick="nextStep('${id}',${cur})">✅ '${nextStep}' 처리 완료</button>`
    :`<div style="background:#d5f5e3;border-radius:8px;padding:14px;text-align:center;margin-bottom:12px"><div style="font-size:16px;font-weight:700;color:#1e8449">🎉 모든 처리 완료!</div><div style="font-size:12px;color:#666;margin-top:4px">${p.date||''}</div></div>`}
    <button class="btn btn-gray" style="width:100%;margin-top:6px;justify-content:center" onclick="deletePay('${id}');closeModal('step-modal')">🗑️ 삭제</button>`;
  openModal('step-modal');
}

window.nextStep=async function(id,cur){
  const p=pays.find(p=>p.id===id);if(!p)return;
  const steps=p.steps||[];
  const newStep=cur+1;
  const stepDates={...(p.stepDates||{}),[steps[cur]]:new Date().toLocaleDateString('ko-KR')};
  await updateDoc(doc(db,'pays',id),{curStep:newStep,stepDates});
  showToast(`✅ '${steps[cur]}' 완료!`);
  closeModal('step-modal');
}

window.deletePay=async function(id){
  if(!confirm('삭제할까요?'))return;
  await deleteDoc(doc(db,'pays',id));showToast('🗑️ 삭제 완료');
}

function renderPays(){
  const filter=(document.getElementById('pay-filter')||{}).value||'all';
  let filtered=pays;
  if(filter==='진행')filtered=pays.filter(p=>(p.curStep||0)<(p.steps||[]).length);
  if(filter==='완료')filtered=pays.filter(p=>(p.curStep||0)>=(p.steps||[]).length);
  const wait=pays.filter(p=>(p.curStep||0)<(p.steps||[]).length);
  const totalWait=wait.reduce((s,p)=>s+(p.amount||0),0);
  const pStats=document.getElementById('pay-stats');
  if(pStats)pStats.innerHTML=`<div class="stat"><div class="stat-n">${wait.length}</div><div class="stat-l">처리중</div></div><div class="stat"><div class="stat-n">${Math.round(totalWait/10000)}만원</div><div class="stat-l">미결금액</div></div>`;
  const el=document.getElementById('pay-list');if(!el)return;
  if(!filtered.length){el.innerHTML='<div class="empty">결제 내역이 없습니다</div>';return;}
  el.innerHTML=filtered.map(p=>{
    const steps=p.steps||[];
    const cur=p.curStep||0;
    const isDone=cur>=steps.length;
    const pct=steps.length?Math.round(cur/steps.length*100):0;
    const nextS=!isDone?steps[cur]:'완료';
    return`<div class="pay-card ${isDone?'done-card':p.typeNum===4||p.typeNum===3?'urgent':'normal'}" onclick="openStepModal('${p.id}')">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px">
        <div><div style="font-size:13px;font-weight:700">${p.vendor}</div><div style="font-size:12px;color:#777;margin-top:1px">${p.siteKey||'-'} · ${p.cat||''}</div></div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:14px;font-weight:700;color:${isDone?'#27ae60':'#1a1a2e'}">${(p.amount||0).toLocaleString()}원</div>
          <span class="badge ${isDone?'b-ok':p.typeNum===4?'b-red':p.typeNum===3?'b-orange':'b-blue'}" style="margin-top:2px">${isDone?'완료':nextS}</span>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        ${steps.map((s,i)=>`<span style="font-size:10px;padding:2px 6px;border-radius:10px;background:${i<cur?'#d5f5e3':i===cur?'#1a1a2e':'#f0f0f0'};color:${i<cur?'#1e8449':i===cur?'#fff':'#bbb'};font-weight:${i===cur?'700':'400'}">${s}</span>`).join('<span style="color:#ddd;font-size:10px">›</span>')}
      </div>
      ${!isDone?`<div class="progress-bar" style="margin-top:8px"><div class="progress-fill" style="width:${pct}%"></div></div>`:''}
      <div style="font-size:11px;color:#bbb;margin-top:6px">${p.typeName||''} · ${p.date||''}</div>
    </div>`;
  }).join('');
}

// 대시보드
function renderDash(){
  const active=sites.filter(s=>s.status==='진행중').length;
  const waitPay=pays.filter(p=>(p.curStep||0)<(p.steps||[]).length);
  const totalWait=waitPay.reduce((s,p)=>s+(p.amount||0),0);
  const ds=document.getElementById('dash-stats');
  if(ds)ds.innerHTML=`<div class="stat"><div class="stat-n">${active}</div><div class="stat-l">진행중 현장</div></div><div class="stat"><div class="stat-n">${Math.round(totalWait/10000)}만</div><div class="stat-l">미결금액(원)</div></div>`;
  const dSites=document.getElementById('dash-sites');
  if(dSites){
    if(!sites.length){dSites.innerHTML='<div class="empty">현장을 먼저 등록하세요</div>';}
    else{
      const sd=sites.map(s=>{
        const sp=pays.filter(p=>p.siteKey&&p.siteKey.includes(s.contract));
        const total=sp.reduce((sum,p)=>sum+(p.amount||0),0);
        const labor=sp.filter(p=>p.cat==='인건비').reduce((sum,p)=>sum+(p.amount||0),0);
        const mat=sp.filter(p=>p.cat==='자재비').reduce((sum,p)=>sum+(p.amount||0),0);
        const lc=logs.filter(l=>l.siteId===s.id).length;
        return{s,total,labor,mat,lc};
      }).sort((a,b)=>b.total-a.total);
      const maxT=Math.max(...sd.map(d=>d.total),1);
      dSites.innerHTML=sd.map(({s,total,labor,mat,lc})=>`<div class="dash-item">
        <div style="flex:1;min-width:0">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div style="font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:170px">${s.contract}</div>
            <div style="font-size:13px;font-weight:700;color:#1a1a2e;flex-shrink:0">${total?total.toLocaleString()+'원':'0원'}</div>
          </div>
          <div style="font-size:11px;color:#999;margin-top:1px">${s.client} · 일지 ${lc}건 · 인건비 ${Math.round(labor/10000)}만 · 자재비 ${Math.round(mat/10000)}만</div>
          <div class="progress-bar"><div class="progress-fill" style="width:${Math.round(total/maxT*100)}%"></div></div>
        </div>
      </div>`).join('');
    }
  }
  const dPay=document.getElementById('dash-pay');
  if(dPay){
    if(!waitPay.length){dPay.innerHTML='<div class="empty">대기 중인 결제 없음</div>';}
    else dPay.innerHTML=waitPay.slice(0,5).map(p=>`<div class="dash-item" onclick="openStepModal('${p.id}')" style="cursor:pointer">
      <div style="flex:1">
        <div style="display:flex;justify-content:space-between">
          <div style="font-size:13px;font-weight:600">${p.vendor}</div>
          <div style="font-size:13px;font-weight:700;color:#e74c3c">${(p.amount||0).toLocaleString()}원</div>
        </div>
        <div style="font-size:12px;color:#999">${p.siteKey||'-'} · 다음: <b>${(p.steps||[])[p.curStep||0]||''}</b></div>
      </div>
    </div>`).join('');
  }
}

document.getElementById('w-date').value=new Date().toISOString().slice(0,10);
</script>
